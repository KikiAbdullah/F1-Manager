<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>F1 Manager 2026</title>
    <meta
      name="description"
      content="F1 Manager 2026 — Manage your Formula 1 team to championship glory."
    />
    <link
      rel="icon"
      href="https://iconape.com/wp-content/png_logo_vector/f1-new-logo.png"
      sizes="32x32"
    />
    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Titillium+Web:wght@300;400;600;700;900&family=Exo+2:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <!-- Tabler Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"
    />
    <link rel="stylesheet" href="src/styles/main.css" />

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
    <!-- GSAP + ScrollTrigger -->
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <!-- Howler.js -->
    <script src="https://cdn.jsdelivr.net/npm/howler@2.2.4/dist/howler.min.js"></script>
  </head>
  <body class="text-white min-vh-100 overflow-hidden" style="background-color: #d3d4d8; font-family: 'Titillium Web', Arial, sans-serif;">
    <!-- App Shell -->
    <div id="app" class="position-relative w-100 vh-100 overflow-hidden">
      <!-- SCREEN: Main Menu -->
      <div id="screen-main-menu" class="screen active"></div>

      <!-- SCREEN: Create Team -->
      <div id="screen-create-team" class="screen hidden"></div>

      <!-- SCREEN: Dashboard -->
      <div id="screen-dashboard" class="screen hidden"></div>

      <!-- SCREEN: Race Weekend -->
      <div id="screen-race" class="screen hidden"></div>

      <!-- SCREEN: Personnel -->
      <div id="screen-personnel" class="screen hidden"></div>

      <!-- SCREEN: Finance -->
      <div id="screen-finance" class="screen hidden"></div>

      <!-- SCREEN: R&D -->
      <div id="screen-rnd" class="screen hidden"></div>

      <!-- SCREEN: Calendar -->
      <div id="screen-calendar" class="screen hidden"></div>

      <!-- Global Toast -->
      <div id="toast" class="position-fixed bottom-0 end-0 p-3 z-3 hidden" style="z-index: 9999;">
        <div id="toast-inner" class="p-3 rounded-2 shadow" style="background-color: #1a1a20; border: 1px solid #383a45; color: white; font-family: 'Titillium Web', Arial, sans-serif;"></div>
      </div>

      <!-- Loading Overlay -->
      <div
        id="loading-overlay"
        class="position-fixed top-0 start-0 w-100 h-100 bg-black d-flex flex-column align-items-center justify-content-center" style="z-index: 9000;"
      >
        <div class="f1-loader mb-4"></div>
        <div
          id="loading-text"
          style="color: #8b8d98; font-family: 'Orbitron', sans-serif; letter-spacing: 0.16em; font-size: 0.875rem;"
        >
          INITIALIZING...
        </div>
      </div>
    </div>

    <!-- ES Module Entry -->
    <script type="module" src="src/main.js"></script>
  </body>
</html>
